name: Hudle Padel Watcher

on:
  schedule:
    # Every 5 minutes — GitHub's minimum cron cadence on free tier.
    # Note: free-tier scheduled jobs can be delayed during peak load (often 5-10 min)
    # but always run eventually. That's fine for slot watching.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # allow manual trigger from the Actions UI

# We need to write the cache and (on Sundays) commit the HEARTBEAT.md file
# back to the repo to keep it "active" for GitHub's 60-day inactivity rule.
permissions:
  contents: write
  actions: write

# Opt all bundled JS actions into Node.js 24 now (they run on Node 20 by default
# until June 2026 then break in Sept 2026). Cosmetic deprecation warning gone.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: hudle-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state cache
        id: state-restore
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: hudle-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            hudle-state-

      - name: Run watcher
        env:
          HUDLE_TOKEN:        ${{ secrets.HUDLE_TOKEN }}
          HUDLE_API_SECRET:   ${{ secrets.HUDLE_API_SECRET }}
          HUDLE_APP_ID:       ${{ secrets.HUDLE_APP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 watch.py

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: hudle-state-${{ github.run_id }}-${{ github.run_attempt }}

      # Commit the weekly heartbeat file so the repo gets a real commit at least
      # once a week — keeps GitHub's scheduled-workflow inactivity timer reset.
      - name: Commit heartbeat (Sunday only)
        if: success()
        run: |
          if [ -n "$(git status --porcelain HEARTBEAT.md 2>/dev/null)" ]; then
            git config user.name "hudle-watcher"
            git config user.email "actions@github.com"
            git add HEARTBEAT.md
            git commit -m "weekly heartbeat $(date -u +%Y-%m-%d)"
            git push
            echo "heartbeat committed"
          else
            echo "no heartbeat change — skipping commit"
          fi

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-log-${{ github.run_id }}
          path: watch.log
          if-no-files-found: ignore
          retention-days: 3
